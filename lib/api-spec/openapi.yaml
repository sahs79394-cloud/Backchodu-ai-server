openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Jarvis AI Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: gemini
    description: Gemini AI chat and image operations
  - name: jarvis
    description: Jarvis AI assistant operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /gemini/conversations:
    get:
      operationId: listGeminiConversations
      tags: [gemini]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiConversation"
    post:
      operationId: createGeminiConversation
      tags: [gemini]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversation"

  /gemini/conversations/{id}:
    get:
      operationId: getGeminiConversation
      tags: [gemini]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiError"
    delete:
      operationId: deleteGeminiConversation
      tags: [gemini]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiError"

  /gemini/conversations/{id}/messages:
    get:
      operationId: listGeminiMessages
      tags: [gemini]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiMessage"
    post:
      operationId: sendGeminiMessage
      tags: [gemini]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /gemini/generate-image:
    post:
      operationId: generateGeminiImage
      tags: [gemini]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiImageInput"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiImageOutput"

  /jarvis/command:
    post:
      operationId: sendJarvisCommand
      tags: [jarvis]
      summary: Send a detected command to MacroDroid webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JarvisCommandInput"
      responses:
        "200":
          description: Command dispatched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JarvisCommandResult"

  /jarvis/webhook-config:
    get:
      operationId: getJarvisWebhookConfig
      tags: [jarvis]
      summary: Get the current MacroDroid webhook configuration
      responses:
        "200":
          description: Current webhook configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JarvisWebhookConfig"
    put:
      operationId: updateJarvisWebhookConfig
      tags: [jarvis]
      summary: Update MacroDroid webhook URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JarvisWebhookConfigInput"
      responses:
        "200":
          description: Updated webhook configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JarvisWebhookConfig"

  /jarvis/command-history:
    get:
      operationId: listJarvisCommandHistory
      tags: [jarvis]
      summary: Get recent command history
      responses:
        "200":
          description: List of recent commands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JarvisCommandRecord"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GeminiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    GeminiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    GeminiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    GeminiMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    GeminiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/GeminiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    GeminiImageInput:
      type: object
      properties:
        prompt:
          type: string
      required:
        - prompt

    GeminiImageOutput:
      type: object
      properties:
        b64_json:
          type: string
        mimeType:
          type: string
      required:
        - b64_json
        - mimeType

    GeminiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    JarvisCommandInput:
      type: object
      properties:
        action:
          type: string
          description: Command action code e.g. OPEN_YOUTUBE
        transcript:
          type: string
          description: Original speech transcript
        language:
          type: string
          description: Detected language code
      required:
        - action

    JarvisCommandResult:
      type: object
      properties:
        success:
          type: boolean
        action:
          type: string
        webhookSent:
          type: boolean
        message:
          type: string
      required:
        - success
        - action
        - webhookSent

    JarvisWebhookConfig:
      type: object
      properties:
        webhookUrl:
          type: ["string", "null"]
        enabled:
          type: boolean
      required:
        - webhookUrl
        - enabled

    JarvisWebhookConfigInput:
      type: object
      properties:
        webhookUrl:
          type: string
        enabled:
          type: boolean
      required:
        - webhookUrl
        - enabled

    JarvisCommandRecord:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        transcript:
          type: ["string", "null"]
        language:
          type: ["string", "null"]
        webhookSent:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - action
        - webhookSent
        - createdAt
